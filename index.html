<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GolfNow CORE Jira Board Template</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      color: #081b3a;
      background: #f5f8fc;
    }
    main {
      max-width: 720px;
      padding: 32px;
      border: 1px solid #d6e0ee;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 16px 48px rgba(8, 27, 58, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    p {
      margin: 0 0 12px;
      line-height: 1.5;
    }
    code {
      padding: 2px 5px;
      border-radius: 4px;
      background: #edf3fb;
    }
  </style>
</head>
<body>
  <main>
    <h1>GolfNow CORE Jira Board Template</h1>
    <p>This repository is ready to generate a release dashboard after <code>JIRA_FIX_VERSION</code> is configured.</p>
    <p>Run the GitHub Actions refresh workflow or run <code>node pull-jira-release-tickets.cjs v3001.x.y</code> locally to publish the first board snapshot.</p>
  </main>
</body>
</html>
