# v3001.124.0 workflow bootstrap
name: Deploy Cloudflare Board and HQ

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - dashboard-data.json
      - index.html
      - boards.json
      - modern/**
      - workers/**
      - scripts/prepare-cloudflare-hq-assets.cjs
      - wrangler.hq.toml
      - .github/workflows/deploy-cloudflare-hq.yml

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy static board and HQ assets
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify Cloudflare token
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Set CLOUDFLARE_API_TOKEN in repository secrets before running this workflow."
            exit 1
          fi

      - name: Prepare Cloudflare board and HQ assets
        run: node scripts/prepare-cloudflare-hq-assets.cjs

      - name: Sync Slack Worker secrets
        run: |
          set -euo pipefail
          if [ -n "${SLACK_BOT_TOKEN:-}" ]; then
            printf '%s' "$SLACK_BOT_TOKEN" | npx -y wrangler secret put SLACK_BOT_TOKEN -c wrangler.hq.toml
          else
            echo "::notice::SLACK_BOT_TOKEN is not set; HQ Slack notifier will report token missing."
          fi

          if [ -n "${SLACK_CHANNEL_ID:-}" ]; then
            printf '%s' "$SLACK_CHANNEL_ID" | npx -y wrangler secret put SLACK_CHANNEL_ID -c wrangler.hq.toml
          else
            echo "::notice::SLACK_CHANNEL_ID is not set; HQ Slack notifier will use SLACK_DEFAULT_CHANNEL_NAME."
          fi

      - name: Deploy board and HQ Worker Static Assets
        run: npx -y wrangler deploy -c wrangler.hq.toml
