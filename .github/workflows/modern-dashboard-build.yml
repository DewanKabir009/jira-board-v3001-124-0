# v3001.124.0 workflow bootstrap
name: Modern Dashboard Static Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - modern-dashboard/**
      - .github/workflows/modern-dashboard-build.yml

permissions:
  contents: read

jobs:
  build:
    name: Build Astro dashboard shell
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: modern-dashboard
        run: npm ci

      - name: Build static dashboard
        working-directory: modern-dashboard
        env:
          ASTRO_TELEMETRY_DISABLED: "1"
          ASTRO_BASE: /${{ github.event.repository.name }}/modern/
          ASTRO_SITE: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          PUBLIC_DASHBOARD_DATA_URL: ../dashboard-data.json
        run: npm run build

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: modern-dashboard-pages-artifact
          path: modern-dashboard/dist
          if-no-files-found: error
